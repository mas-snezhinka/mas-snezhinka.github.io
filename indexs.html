<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === ОСНОВНЫЕ ЦВЕТА === */
        :root {
            --vk-blue: #005ff9;
            --vk-light: #00b2ff;
            --white: #ffffff;
            --bg-dark: #0A0C0F;
            --surface-dark: #1f1f1f;
        }

        /* Скрываем скроллбар */
        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-dark);
            font-family: "Inter", sans-serif;
            color: #E1E3E6;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        /* --- ПРОСТОЙ ХЕДЕР --- */
        .page-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background-color: transparent;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.02em;
        }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР (СКРОЛЛИНГ) --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            width: 100%;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- АККОРДЕОНЫ --- */
        .locations-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .accordion-card {
            background: rgba(20, 25, 30, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 8px; /* изменено с 28px на 8px */
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.5);
            transition: all 0.2s;
            overflow: hidden;
        }

        .accordion-card:hover {
            border-color: rgba(0, 119, 255, 0.3);
            box-shadow: 0 20px 30px -10px #0077ff33;
        }

        /* --- ЗАГОЛОВОК АККОРДЕОНА (стиль футера) --- */
        .accordion-header {
            background-color: var(--vk-blue);
            position: relative;
            height: 80px;
            cursor: pointer;
            user-select: none;
            border-radius: 8px 8px 0 0; /* подогнано под общий радиус карточки */
            overflow: hidden;
        }

        /* Белая полоса сверху */
        .accordion-header::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 8px;
            background: var(--white);
            z-index: 2;
            pointer-events: none;
        }

        /* Полосатая нижняя полоска */
        .accordion-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 18px;
            background: repeating-linear-gradient(60deg, var(--white), var(--white) 6px, transparent 6px, transparent 12px);
            z-index: 2;
            pointer-events: none;
        }

        /* Ромб (логотип) */
        .logo-wrap-accordion {
            position: absolute;
            left: 20px;
            top: 5px;
            z-index: 10;
        }

        .hex-header-spacer {
            width: 70px;
            height: 70px;
            background: var(--vk-blue);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hex-header-p1 {
            width: 58px;
            height: 58px;
            background: var(--white);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hex-header-w1 {
            width: 88%;
            height: 88%;
            background: var(--vk-blue);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hex-header-p2 {
            width: 84%;
            height: 84%;
            background: var(--white);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hex-header-inner {
            width: 74%;
            height: 74%;
            background: var(--vk-light);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        /* Текст заголовка */
        .accordion-title-text {
            position: absolute;
            left: 100px; /* 20 + 70 + 10 */
            top: 34px;
            font-size: 20px;
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            color: var(--white);
            z-index: 5;
            white-space: nowrap;
            line-height: 1;
            max-width: calc(100% - 200px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Стрелка справа */
        .accordion-arrow {
            position: absolute;
            right: 24px;
            top: 55.5%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: var(--white);
            z-index: 20;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .accordion-card.active .accordion-arrow {
            transform: translateY(-50%) rotate(180deg);
        }

        /* Контент аккордеона */
        .accordion-content {
            max-height: 0;
            padding: 0 28px;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid transparent;
        }

        .accordion-card.active .accordion-content {
            max-height: 1000px;
            padding: 20px 28px 28px 28px;
            border-top-color: rgba(255,255,255,0.05);
        }

        .location-list {
            list-style: none;
        }

        .location-list li {
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: #d0d4d9;
        }

        .location-list li:last-child {
            border-bottom: none;
        }

        .location-list i {
            color: #0077FF;
            font-size: 1rem;
            margin-top: 4px;
            min-width: 20px;
        }

        /* --- АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ --- */
        @media (max-width: 700px) {
            .page-header {
                padding: 16px 20px;
            }
            .header-title {
                font-size: 22px;
            }

            .accordion-header {
                height: 70px;
            }
            .accordion-header::before {
                top: 15px;
                height: 6px;
            }
            .accordion-header::after {
                height: 14px;
            }
            .logo-wrap-accordion {
                left: 15px;
                top: 2px;
            }
            .hex-header-spacer {
                width: 60px;
                height: 60px;
            }
            .hex-header-p1 {
                width: 50px;
                height: 50px;
            }
            .accordion-title-text {
                left: 85px;
                top: 28px;
                font-size: 18px;
                max-width: calc(100% - 150px);
            }
            .accordion-arrow {
                right: 18px;
                font-size: 1.8rem;
            }
        }

        @media (max-width: 560px) {
            .header-title {
                font-size: 18px;
            }
            .accordion-title-text {
                left: 80px;
                font-size: 16px;
                max-width: calc(100% - 130px);
            }
        }
    </style>
</head>
<body>
    <!-- Простой хедер с названием станции -->
    <header class="page-header">
        <div class="header-title">МАС «Снежинка»</div>
    </header>

    <main class="main-content">
        <div class="dashboard">
            <div class="locations-grid" id="locationsAccordion"></div>
        </div>
    </main>

    <script>
        (function() {
            // Данные локаций (полный перечень из файла)
            const locationSections = [
                {
                    title: 'Жилые и общественные модули',
                    items: [
                        'Жилые блоки: индивидуальные каюты для учёных и персонала (80 мест)',
                        'Кухонно-столовый блок — пространство для приготовления и приёма пищи',
                        'Медицинский блок: кабинет для оказания помощи и мониторинга здоровья',
                        'Спортивный зал с тренажёрами',
                        'Зоны отдыха и коворкинга (открытые пространства)'
                    ]
                },
                {
                    title: 'Научно-исследовательский блок',
                    items: [
                        'Лаборатория водородной энергетики (электролиз, топливные элементы)',
                        'Лаборатория возобновляемых источников энергии (ВИЭ)',
                        'Лаборатория систем накопления энергии',
                        'Лаборатория робототехники и беспилотных систем',
                        'Лаборатория мониторинга окружающей среды и климата',
                        'Лаборатория систем жизнеобеспечения и замкнутых циклов',
                        'Лаборатория биотехнологий и синтетической биологии',
                        'Лаборатория новых материалов',
                        'Лаборатория телемедицины',
                        'Лаборатория инфокоммуникационных технологий',
                        'Мастерские прототипирования (3D-печать, станки)'
                    ]
                },
                {
                    title: 'Технические и энергетические локации',
                    items: [
                        'Водородный комплекс (электролизеры, хранение водорода, топливные элементы)',
                        'Аккумуляторная зона (накопители энергии)',
                        'Система водоочистки и утилизации',
                        'Центральный пост управления (ЦПУ)',
                        'Серверная и узел связи',
                        'Складские помещения (ЗИП, расходные материалы)'
                    ]
                },
                {
                    title: 'Хозяйственный блок',
                    items: [
                        'Участок водоподготовки и водоочистки',
                        'Участок утилизации и переработки ТБО',
                        'Прачечный комплекс'
                    ]
                },
                {
                    title: 'Внешняя инфраструктура — энергокомплекс',
                    items: [
                        'Ветропарк (поле ветроэнергетических установок)',
                        'Солнечная ферма (фотоэлектрические панели)',
                        'Водородная станция (хранилища сжатого водорода)',
                        'Резервный дизель-генераторный узел'
                    ]
                },
                {
                    title: 'Транспортно-логистический узел',
                    items: [
                        'Вертолётная площадка',
                        'Дронопорт (инфраструктура для БАС)',
                        'Тёплый ангар для спецтехники (вездеходы, снегоходы)',
                        'Открытые площадки для хранения крупногабаритных грузов'
                    ]
                },
                {
                    title: 'Испытательный полигон',
                    items: [
                        'Площадка для натурных испытаний материалов и конструкций',
                        'Метеорологическая площадка'
                    ]
                }
            ];

            const container = document.getElementById('locationsAccordion');
            if (!container) return;

            locationSections.forEach(section => {
                const card = document.createElement('div');
                card.className = 'accordion-card';

                // Заголовок — точная копия футера
                const header = document.createElement('div');
                header.className = 'accordion-header';

                // Ромб (логотип)
                const logoWrap = document.createElement('div');
                logoWrap.className = 'logo-wrap-accordion';
                logoWrap.innerHTML = `
                    <div class="hex-header-spacer">
                        <div class="hex-header-p1">
                            <div class="hex-header-w1">
                                <div class="hex-header-p2">
                                    <div class="hex-header-inner"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Текст заголовка
                const titleSpan = document.createElement('span');
                titleSpan.className = 'accordion-title-text';
                titleSpan.textContent = section.title;

                // Стрелка
                const arrow = document.createElement('div');
                arrow.className = 'accordion-arrow';
                arrow.innerHTML = '<i class="fas fa-chevron-down"></i>';

                header.appendChild(logoWrap);
                header.appendChild(titleSpan);
                header.appendChild(arrow);

                // Контент
                const content = document.createElement('div');
                content.className = 'accordion-content';

                const list = document.createElement('ul');
                list.className = 'location-list';

                section.items.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<i class="fas fa-angle-right"></i> ${item}`;
                    list.appendChild(li);
                });

                content.appendChild(list);
                card.appendChild(header);
                card.appendChild(content);
                container.appendChild(card);

                // Клик по заголовку
                header.addEventListener('click', () => {
                    card.classList.toggle('active');
                });
            });

            // По умолчанию все блоки скрыты (убираем автоматическое добавление active)
            // container.firstChild?.classList.remove('active'); (гарантия, но active и так не добавляется)
        })();
    </script>
</body>
