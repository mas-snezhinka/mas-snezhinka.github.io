<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МАС «Снежинка» — 3D модели</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === Светлая тема, минимум цветов === */
        :root {
            --vk-blue: #005ff9;
            --vk-light: #00b2ff;
            --white: #ffffff;
            --bg-light: #ffffff;
            --surface-light: #f8f9fa;
            --text-primary: #222222;
            --text-secondary: #555555;
            --shadow-sm: 0 10px 30px -10px rgba(0,0,0,0.15);
            --shadow-hover: 0 20px 40px -15px rgba(0,95,249,0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        /* Контейнер для canvas на весь экран */
        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #fafafa;
        }

        #three-canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* Интерфейс поверх canvas */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Верхний блок: шапка и кнопки */
        .top-area {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка (оригинальная) */
        .header-box {
            position: relative;
            width: 100%;
            height: 135px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .line-main {
            position: absolute;
            top: 28px;
            left: 0;
            right: 0;
            height: 18px;
            z-index: 1;
        }

        .title-text {
            position: absolute;
            left: 170px;
            top: 50px;
            font-size: 50px;
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            z-index: 5;
            white-space: nowrap;
            line-height: 0.8;
        }

        .logo-wrap {
            position: absolute;
            left: 45px;
            top: 8px;
            z-index: 10;
        }

        .hex {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex; align-items: center; justify-content: center;
        }

        .hex-spacer { width: 110px; height: 110px; }
        .hex-p1 { width: 92px; height: 92px; }
        .hex-w1 { width: 88%; height: 88%; }
        .hex-p2 { width: 84%; height: 84%; }
        .hex-inner { width: 74%; height: 74%; }

        .stripes-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35px;
            z-index: 1;
        }

        .vk-variant { background-color: var(--vk-blue); }
        .vk-variant .line-main { background-color: var(--white); }
        .vk-variant .title-text { color: var(--white); }
        .vk-variant .hex-spacer { background: var(--vk-blue); }
        .vk-variant .hex-p1 { background: var(--white); }
        .vk-variant .hex-w1 { background: var(--vk-blue); }
        .vk-variant .hex-p2 { background: var(--white); }
        .vk-variant .hex-inner { background: var(--vk-light); }
        .vk-variant .stripes-bottom { 
            background: repeating-linear-gradient(45deg, var(--white), var(--white) 6px, transparent 6px, transparent 12px); 
        }

        /* Панель переключения моделей */
        .model-switch {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            flex-wrap: wrap;
            pointer-events: auto;
        }

        .model-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid #e0e0e0;
            border-radius: 60px;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            letter-spacing: 0.5px;
        }

        .model-btn i {
            margin-right: 10px;
            color: var(--vk-blue);
        }

        .model-btn:hover {
            border-color: var(--vk-blue);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            background: white;
        }

        .model-btn.active {
            background: var(--vk-blue);
            color: white;
            border-color: var(--vk-blue);
        }
        .model-btn.active i {
            color: white;
        }

        /* Нижняя область */
        .bottom-area {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 0;
        }

        /* Иконка стрелочки (без текста) */
        .hint {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 12px 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #eee;
            color: #444;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Футер на всю ширину, без скругления */
        .footer {
            background: white;
            padding: 15px 30px;
            border: 1px solid #e0e0e0;
            border-bottom: none;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            width: 100%;
            color: var(--text-secondary);
            border-radius: 0;
        }

        /* Убраны все фильтры и эффекты для изображений */
        .footer img {
            height: 28px;
            opacity: 1; /* без изменений */
            display: inline-block;
            vertical-align: middle;
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px dotted #aaa;
            transition: color 0.2s, border-bottom-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .footer a:hover {
            color: var(--vk-blue);
            border-bottom-color: var(--vk-blue);
        }

        /* Для ссылки с логотипом VK убираем border-bottom и сохраняем естественный вид */
        .footer a.vk-logo-link {
            border-bottom: none;
        }
        .footer a.vk-logo-link:hover {
            border-bottom: none;
        }

        .footer-links {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            align-items: center;
        }
        .footer-links span.sep {
            color: #ccc;
        }

        /* Индикатор загрузки (только иконка) */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .loader-overlay i {
            font-size: 4rem;
            color: var(--vk-blue);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        @media (max-width: 700px) {
            .title-text {
                font-size: 28px;
                left: 130px;
                top: 60px;
            }
            .hex-spacer { width: 80px; height: 80px; }
            .logo-wrap { left: 25px; }
            .model-btn { padding: 10px 20px; font-size: 1rem; }
            .footer { flex-direction: column; gap: 10px; text-align: center; }
            .footer-links { justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Полноэкранный canvas -->
    <div class="canvas-container">
        <div id="loader" class="loader-overlay" style="opacity: 0;">
            <i class="fas fa-spinner fa-pulse"></i>
        </div>
        <canvas id="three-canvas"></canvas>
    </div>

    <!-- Интерфейс поверх -->
    <div class="ui-overlay">
        <!-- Верхняя часть: шапка и кнопки -->
        <div class="top-area">
            <div class="header-box vk-variant">
                <div class="line-main"></div>
                <div class="logo-wrap">
                    <div class="hex hex-spacer">
                        <div class="hex hex-p1"><div class="hex hex-w1"><div class="hex hex-p2"><div class="hex hex-inner"></div></div></div></div>
                    </div>
                </div>
                <div class="title-text">МАС «СНЕЖИНКА»</div>
                <div class="stripes-bottom"></div>
            </div>
            <div class="model-switch">
                <button class="model-btn" id="btn-snowflake"><i class="fas fa-snowflake"></i> Снежинка</button>
                <button class="model-btn" id="btn-rusak"><i class="fas fa-truck"></i> K-8</button>
                <button class="model-btn" id="btn-sherp"><i class="fas fa-tractor"></i> Шерп</button>
            </div>
        </div>

        <!-- Нижняя часть: иконка стрелочки и футер -->
        <div class="bottom-area">
            <!-- Иконка стрелочки (без текста) -->
            <div class="hint">
                <i class="fas fa-arrows"></i>
            </div>
            <footer class="footer">
                <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                    <!-- png иконки закомментированы -->
                    <!-- <img src="https://refoldit.github.io/img/logo/vkplay-logo-w.png" alt="VK Play"> -->
                    <!-- <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="МАС Снежинка"> -->
                    <span>© 2026</span>
                    <span class="footer-links">
                        <!-- Порядок: МАС Снежинка, Snowflake International, BRICS, VK Play (лого), qFoldIT -->
                        <a href="https://arctic-mipt.com/" target="_blank" rel="noopener noreferrer"><i class="fas fa-snowflake"></i> МАС Снежинка</a>
                        <span class="sep">|</span>
                        <a href="https://arctic-council.org/news/the-snowflake-international-arctic-station-a-hub-for-energy-innovation-and-cultural-exchange/" target="_blank" rel="noopener noreferrer"><i class="fas fa-globe"></i> Snowflake International</a>
                        <span class="sep">|</span>
                        <a href="https://infobrics.org/" target="_blank" rel="noopener noreferrer"><i class="fas fa-flag"></i> BRICS</a>
                        <span class="sep">|</span>
                        <!-- VK Play ссылка с логотипом (без текста) — убраны все эффекты -->
                        <a href="https://vkplay.ru/" target="_blank" rel="noopener noreferrer" class="vk-logo-link" style="border-bottom: none;">
                            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" style="height: 28px;">
                        </a>
                        <span class="sep">|</span>
                        <a href="https://github.com/qfoldit" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i> qFoldIT</a>
                    </span>
                </div>
            </footer>
        </div>
    </div>

    <!-- Three.js и скрипты -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        (function() {
            const MODELS = {
                snowflake: 'https://tripreport.github.io/3D/snowflake_snowflake.glb',
                rusak: 'https://tripreport.github.io/3D/k-8.glb',
                sherp: 'https://tripreport.github.io/3D/sherp_alone.glb'
            };

            const canvas = document.getElementById('three-canvas');
            const loaderDiv = document.getElementById('loader');
            const btnSnow = document.getElementById('btn-snowflake');
            const btnRusak = document.getElementById('btn-rusak');
            const btnSherp = document.getElementById('btn-sherp');
            const buttons = [btnSnow, btnRusak, btnSherp];

            let scene, camera, renderer, controls;
            let currentModel = null;

            function initThree() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0xfafafa);

                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(5, 5, 10);

                renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.autoRotate = true;
                controls.autoRotateSpeed = 1.5;
                controls.enableZoom = true;
                controls.enablePan = true;
                controls.maxPolarAngle = Math.PI / 2;

                // Освещение
                const ambient = new THREE.AmbientLight(0x404060);
                scene.add(ambient);

                const dirLight = new THREE.DirectionalLight(0xffffff, 1);
                dirLight.position.set(2, 5, 3);
                dirLight.castShadow = true;
                dirLight.receiveShadow = true;
                dirLight.shadow.mapSize.width = 1024;
                dirLight.shadow.mapSize.height = 1024;
                const d = 10;
                dirLight.shadow.camera.left = -d;
                dirLight.shadow.camera.right = d;
                dirLight.shadow.camera.top = d;
                dirLight.shadow.camera.bottom = -d;
                dirLight.shadow.camera.near = 1;
                dirLight.shadow.camera.far = 15;
                scene.add(dirLight);

                const backLight = new THREE.DirectionalLight(0xccddff, 0.5);
                backLight.position.set(-3, 2, -4);
                scene.add(backLight);

                const fillLight = new THREE.PointLight(0x88aaff, 0.4);
                fillLight.position.set(0, 0, 4);
                scene.add(fillLight);

                // Плоскость для теней (полупрозрачная, без сетки)
                const planeGeometry = new THREE.CircleGeometry(8, 32);
                const planeMaterial = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
                const plane = new THREE.Mesh(planeGeometry, planeMaterial);
                plane.rotation.x = -Math.PI / 2;
                plane.position.y = 0;
                plane.receiveShadow = true;
                scene.add(plane);

                animate();
            }

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }

            // Функция для установки камеры так, чтобы модель занимала почти весь экран
            function frameModel(model) {
                const box = new THREE.Box3().setFromObject(model);
                const sphere = box.getBoundingSphere(new THREE.Sphere());
                const center = sphere.center;
                const radius = sphere.radius;

                const fov = camera.fov * Math.PI / 180;
                const distance = radius / Math.tan(fov / 2) * 1.2; // запас 20%

                const direction = new THREE.Vector3(1, 0.5, 1).normalize();
                camera.position.copy(center.clone().add(direction.multiplyScalar(distance)));
                controls.target.copy(center);
                controls.update();
            }

            function loadModel(modelKey) {
                const url = MODELS[modelKey];
                if (!url) return;

                loaderDiv.style.opacity = '1';

                if (currentModel) {
                    scene.remove(currentModel);
                    currentModel = null;
                }

                const loader = new THREE.GLTFLoader();
                loader.load(url, 
                    (gltf) => {
                        const model = gltf.scene;
                        model.traverse(node => {
                            if (node.isMesh) {
                                node.castShadow = true;
                                node.receiveShadow = true;
                            }
                        });

                        // Масштабируем модель до разумного размера (макс. габарит ~4.5)
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 4.5 / maxDim;
                        model.scale.set(scale, scale, scale);

                        // Центрируем по горизонтали и ставим на пол
                        box.setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const minY = box.min.y;
                        model.position.set(-center.x, -minY, -center.z);

                        scene.add(model);
                        currentModel = model;

                        // Кадрируем модель на весь экран
                        frameModel(model);

                        loaderDiv.style.opacity = '0';
                    },
                    undefined,
                    (error) => {
                        console.error('Ошибка загрузки модели:', error);
                        loaderDiv.style.opacity = '0';
                    }
                );
            }

            function setActiveButton(activeBtn) {
                buttons.forEach(btn => btn.classList.remove('active'));
                activeBtn.classList.add('active');
            }

            btnSnow.addEventListener('click', () => {
                setActiveButton(btnSnow);
                loadModel('snowflake');
            });
            btnRusak.addEventListener('click', () => {
                setActiveButton(btnRusak);
                loadModel('rusak');
            });
            btnSherp.addEventListener('click', () => {
                setActiveButton(btnSherp);
                loadModel('sherp');
            });

            window.addEventListener('load', () => {
                initThree();
                btnSnow.classList.add('active');
                loadModel('snowflake');
            });

            window.addEventListener('resize', () => {
                if (!renderer || !camera) return;
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                if (currentModel) {
                    frameModel(currentModel);
                }
            });
        })();
    </script>
</body>
</html>
