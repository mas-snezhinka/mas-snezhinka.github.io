        .accordion-header {
            background-color: var(--vk-blue);

            height: 80px;
            cursor: pointer;
            user-select: none;
            border-radius: 8px 8px 0 0;
            overflow: hidden;

            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 8px;
            background: var(--white);
            z-index: 2;
            pointer-events: none;
        }

        .accordion-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 18px;
            background: repeating-linear-gradient(60deg, var(--white), var(--white) 6px, transparent 6px, transparent 12px);

            pointer-events: none;

            top: 5px;

            align-items: center;
            justify-content: center;

            height: 88%;

            align-items: center;
            justify-content: center;

            height: 84%;

            align-items: center;

            }
            .accordion-title-text {
                left: 80px;
                font-size: 16px;
                max-width: calc(100% - 130px);
            }
        }

                            desc: 'Визуализация криогенных резервуаров, систем безопасности, заправочных колонок.',
                            countries: ['ru', 'sa']
                        },
                        {
                            name: 'Резервный дизель-генераторный узел',
                            desc: 'Модель работы ДГУ в автономном режиме, отображение уровня топлива и аварийных сценариев.',
                            countries: ['ru']
                        }
                    ]
                },
                {
                    title: 'Транспортно-логистический узел',
                    items: [
                        {
                            name: 'Вертолётная площадка',
                            desc: '3D-сцена с вертолётом (модель Ми-8 или аналоги), симуляция взлёта/посадки, управление светосигнальным оборудованием.',
                            countries: ['ru']
                        },
                        {
                            name: 'Дронопорт (инфраструктура для БАС)',
                            desc: 'Модели зарядных станций, ангаров для дронов, симуляция полётных заданий, автономная навигация.',
                            countries: ['cn', 'ru']
                        },
                        {
                            name: 'Тёплый ангар для спецтехники (вездеходы, снегоходы)',
                            desc: 'Цифровые двойники вездеходов RUSAK, снегоходов, системы диагностики и технического обслуживания.',
                            countries: ['ru']
                        },
                        {
                            name: 'Открытые площадки для хранения крупногабаритных грузов',
                            desc: 'Планировка складирования, учёт техники, визуализация грузовых операций.',
                            countries: ['ru']
                        }
                    ]
                },
                {
                    title: 'Испытательный полигон',
                    items: [
                        {
                            name: 'Площадка для натурных испытаний материалов и конструкций',
                            desc: 'Виртуальные стенды для тестирования новых материалов в условиях Арктики (мороз, ветер, снеговая нагрузка).',
                            countries: ['ru', 'no']
                        },
                        {
                            name: 'Метеорологическая площадка',
                            desc: 'Отображение реальных данных с датчиков, визуализация погодных явлений, долгосрочное моделирование климата.',
                            countries: ['ru', 'is']
                        }
                    ]
                }
            ];

            const container = document.getElementById('locationsAccordion');
            if (!container) return;

            // Функция рендеринга флагов
            function renderFlags(countryCodes) {
                if (!countryCodes || countryCodes.length === 0) return '';
                return `<div class="location-flags">${countryCodes.map(code => `
                    <span class="flag-item">
                        <span class="fi fi-${code}"></span>
                        <span>${code.toUpperCase()}</span>
                    </span>
                `).join('')}</div>`;
            }

            locationSections.forEach(section => {
                const card = document.createElement('div');
                card.className = 'accordion-card';

                // Заголовок
                const header = document.createElement('div');
                header.className = 'accordion-header';

                const logoWrap = document.createElement('div');
                logoWrap.className = 'logo-wrap-accordion';
                logoWrap.innerHTML = `
                    <div class="hex-header-spacer">
                        <div class="hex-header-p1">
                            <div class="hex-header-w1">
                                <div class="hex-header-p2">
                                    <div class="hex-header-inner"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                const titleSpan = document.createElement('span');
                titleSpan.className = 'accordion-title-text';
                titleSpan.textContent = section.title;

                const arrow = document.createElement('div');
                arrow.className = 'accordion-arrow';
                arrow.innerHTML = '<i class="fas fa-chevron-down"></i>';

                header.appendChild(logoWrap);
                header.appendChild(titleSpan);
                header.appendChild(arrow);

                // Контент
                const content = document.createElement('div');
                content.className = 'accordion-content';

                const list = document.createElement('ul');
                list.className = 'location-list';

                section.items.forEach(item => {
                    const li = document.createElement('li');
                    // Название с иконкой
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'location-name';
                    nameDiv.innerHTML = `<i class="fas fa-angle-right"></i> ${item.name}`;
                    li.appendChild(nameDiv);

                    // Блок деталей (описание + флаги)
                    const detailsDiv = document.createElement('div');
                    detailsDiv.className = 'location-details';
                    detailsDiv.innerHTML = `
                        <div class="location-desc">${item.desc}</div>
                        ${renderFlags(item.countries)}
                    `;
                    li.appendChild(detailsDiv);

                    list.appendChild(li);
                });

                content.appendChild(list);
                card.appendChild(header);
                card.appendChild(content);
                container.appendChild(card);

                // Клик по заголовку
                header.addEventListener('click', () => {
                    card.classList.toggle('active');
                });
            });
        })();
    </script>
</body>
</html>
